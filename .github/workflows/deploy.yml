name: Deploy

# Déploie sur la VM après une CI réussie sur main, ou à la demande.
# Tourne sur un runner self-hosted installé sur la VM (aucun port entrant ni
# clé SSH à gérer : le runner sort vers GitHub).
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

# Un seul déploiement à la fois ; on ne coupe pas un déploiement en cours.
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    # Déploie uniquement si la CI a réussi (ou si déclenché manuellement).
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: [self-hosted, bot_logs]
    steps:
      - name: Pull + rebuild (si nouveau commit)
        run: |
          cd "${DEPLOY_PATH:-$HOME/bot_logs}"
          ./scripts/deploy.sh
        env:
          # Chemin du dépôt de production sur la VM (variable de dépôt GitHub).
          DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}
          DEPLOY_BRANCH: main
